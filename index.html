<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Placar para torneios de gateball amadores.">
	<title>Gateball — Fase de Classificação</title>
	<style>
		/* Light theme (default — easier on older eyes) */
		:root, :root[data-theme="light"] {
			--bg: #f8fafc;
			--panel: #ffffff;
			--panel-2: #e2e8f0;
			--border: #cbd5e1;
			--text: #0f172a;
			--muted: #475569;
			--accent: #0284c7;
			--accent-hover: #0369a1;
			--win: #15803d;
			--loss: #b91c1c;
			--danger: #dc2626;
			--danger-hover: #b91c1c;
			--row-alt: #f1f5f9;
		}

		/* Dark theme */
		html[data-theme="dark"] {
			--bg: #0f172a;
			--panel: #1e293b;
			--panel-2: #334155;
			--border: #475569;
			--text: #f1f5f9;
			--muted: #94a3b8;
			--accent: #38bdf8;
			--accent-hover: #0ea5e9;
			--win: #4ade80;
			--loss: #f87171;
			--danger: #ef4444;
			--danger-hover: #dc2626;
			--row-alt: #273549;
		}

		/* High-contrast theme (maximum readability on the big screen) */
		html[data-theme="high-contrast"] {
			--bg: #ffffff;
			--panel: #ffffff;
			--panel-2: #000000;
			--border: #000000;
			--text: #000000;
			--muted: #1f2937;
			--accent: #1d4ed8;
			--accent-hover: #1e3a8a;
			--win: #14532d;
			--loss: #7f1d1d;
			--danger: #991b1b;
			--danger-hover: #7f1d1d;
			--row-alt: #f3f4f6;
		}
		html[data-theme="high-contrast"] th { color: #ffffff; }
		html[data-theme="high-contrast"] .btn { color: #ffffff; }
		html[data-theme="high-contrast"] .btn-primary { color: #ffffff; }
		html[data-theme="high-contrast"] .theme-select { color: #ffffff; }
		html[data-theme="high-contrast"] .theme-select option { color: #000000; background: #ffffff; }

		* { box-sizing: border-box; }

		html, body {
			margin: 0;
			padding: 0;
			color: var(--text);
			font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
			font-size: 17px;
		}
		html { background: var(--bg); }
		body {
			background: var(--bg);
			min-height: 100vh;
		}

		.theme-select {
			background: var(--panel-2);
			color: var(--text);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 0.5rem 0.75rem;
			font-size: 0.9rem;
			cursor: pointer;
		}

		.app {
			max-width: 1200px;
			margin: 0 auto;
			padding: 1.5rem;
		}

		header {
			display: flex;
			flex-wrap: wrap;
			gap: 1rem;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 1.5rem;
		}

		h1 {
			margin: 0;
			font-size: 2rem;
			font-weight: 600;
		}

		.tournament-name {
			background: transparent;
			color: var(--text);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 0.5rem 0.75rem;
			font-size: 1rem;
			min-width: 220px;
		}

		.toolbar {
			display: flex;
			flex-wrap: wrap;
			gap: 0.5rem;
		}

		.btn {
			background: var(--panel-2);
			color: var(--text);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 0.5rem 0.9rem;
			font-size: 0.9rem;
			cursor: pointer;
			font-weight: 500;
		}
		.btn:hover { background: var(--accent); border-color: var(--accent); }
		.btn-primary { background: var(--accent); border-color: var(--accent); color: #ffffff; }
		.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #ffffff; }
		.btn-danger { background: var(--danger); border-color: var(--danger); color: white; }
		.btn-danger:hover { background: var(--danger-hover); border-color: var(--danger-hover); }

		section {
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 1.25rem;
			margin-bottom: 1.25rem;
		}

		section h2 {
			margin: 0 0 1rem 0;
			font-size: 1.1rem;
			font-weight: 600;
			color: var(--muted);
			text-transform: uppercase;
			letter-spacing: 0.05em;
		}

		form.match-form {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: center;
			gap: 0.75rem;
		}
		form.match-form input {
			background: var(--bg);
			color: var(--text);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 0.55rem 0.75rem;
			font-size: 1rem;
		}
		form.match-form input[type="text"] { width: 200px; }
		form.match-form input[type="number"] { width: 70px; text-align: center; font-weight: 600; }
		form.match-form input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
		.vs-divider {
			font-weight: 700;
			color: var(--muted);
			padding: 0 0.25rem;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			font-size: 0.95rem;
		}
		th, td {
			padding: 0.65rem 0.75rem;
			text-align: center;
			border-bottom: 1px solid var(--border);
		}
		th {
			background: var(--panel-2);
			color: var(--muted);
			text-transform: uppercase;
			font-size: 0.75rem;
			letter-spacing: 0.05em;
			font-weight: 600;
		}
		tbody tr:nth-child(even) { background: var(--row-alt); }
		td.team { font-weight: 500; }
		td.winner {
			color: var(--win);
			font-weight: 700;
			background: color-mix(in srgb, var(--win) 12%, transparent);
		}
		td.loser { color: var(--text); opacity: 0.7; }
		td.draw { color: var(--muted); font-weight: 600; font-style: italic; }
		.trophy { margin-right: 0.4rem; }
		.match-score {
			font-size: 1.25rem;
			font-weight: 800;
			letter-spacing: 0.05em;
		}
		.match-score .sep { color: var(--muted); font-weight: 500; margin: 0 0.5rem; }
		.match-score .winning-score { color: var(--win); }
		.match-score .losing-score { color: var(--text); opacity: 0.7; }
		td.pos { font-weight: 700; color: var(--accent); }

		.empty {
			text-align: center;
			color: var(--muted);
			padding: 1.5rem;
			font-style: italic;
		}

		.delete-btn {
			background: transparent;
			color: var(--loss);
			border: 1px solid var(--loss);
			border-radius: 4px;
			padding: 0.25rem 0.6rem;
			cursor: pointer;
			font-size: 0.85rem;
		}
		.delete-btn:hover { background: var(--loss); color: white; }

		/* Big screen / fullscreen presentation mode */
		body.big-screen .app { max-width: none; padding: 2rem 3rem; }
		body.big-screen header,
		body.big-screen section.input-section,
		body.big-screen section.matches-section { display: none; }
		body.big-screen section.classification-section {
			background: var(--bg);
			border: none;
			padding: 0;
		}
		body.big-screen section.classification-section h2 {
			font-size: 3rem;
			text-align: center;
			color: var(--accent);
			margin-bottom: 2rem;
		}
		body.big-screen table { font-size: 2rem; }
		body.big-screen th { font-size: 1.3rem; padding: 1.25rem 1rem; }
		body.big-screen td { padding: 1.25rem 1rem; }

		.hidden { display: none !important; }
	</style>
</head>
<body>
	<div class="app">
		<header>
			<div>
				<h1>Fase de Classificação</h1>
				<input id="tournamentName" class="tournament-name" type="text" placeholder="Nome do torneio" autocomplete="off">
			</div>
			<div class="toolbar">
				<select class="theme-select" id="themeSelect" title="Tema">
					<option value="light">Tema Claro</option>
					<option value="dark">Tema Escuro</option>
					<option value="high-contrast">Alto Contraste</option>
				</select>
				<button class="btn" id="btnFullscreen">Tela Cheia</button>
				<button class="btn" id="btnExport">Salvar Backup</button>
				<button class="btn" id="btnImport">Carregar Backup</button>
				<button class="btn btn-danger" id="btnNew">Novo Torneio</button>
				<input id="importFile" type="file" accept="application/json" class="hidden">
			</div>
		</header>

		<section class="input-section">
			<h2>Adicionar Partida</h2>
			<form class="match-form" id="matchForm">
				<input id="t1name" type="text" placeholder="Time 1" autocomplete="off" required>
				<input id="t1score" type="number" min="0" value="0" required>
				<span class="vs-divider">vs</span>
				<input id="t2score" type="number" min="0" value="0" required>
				<input id="t2name" type="text" placeholder="Time 2" autocomplete="off" required>
				<button class="btn btn-primary" type="submit">Adicionar</button>
			</form>
		</section>

		<section class="matches-section">
			<h2>Partidas</h2>
			<table id="matchesTable">
				<thead>
					<tr>
						<th>Equipe</th>
						<th>Placar</th>
						<th>Equipe</th>
						<th>Ações</th>
					</tr>
				</thead>
				<tbody id="matchesBody"></tbody>
			</table>
			<div id="matchesEmpty" class="empty">Nenhuma partida registrada.</div>
		</section>

		<section class="classification-section">
			<h2>Classificação</h2>
			<table id="classificationTable">
				<thead>
					<tr>
						<th>Posição</th>
						<th>Equipe</th>
						<th>Vitórias</th>
						<th>Derrotas</th>
						<th>Empates</th>
						<th>Pontos Feitos</th>
						<th>Pontos Sofridos</th>
						<th>Saldo</th>
					</tr>
				</thead>
				<tbody id="classificationBody"></tbody>
			</table>
			<div id="classificationEmpty" class="empty">Adicione partidas para ver a classificação.</div>
		</section>
	</div>

	<script>
		'use strict';

		/*
		 * Gateball Tracker — offline tournament scoreboard.
		 *
		 * Domain:
		 *   A "match" is a single game between two teams, each with a score.
		 *   A "tournament" is a named collection of matches.
		 *   The "standings" (classification / ranking) are derived from the
		 *   matches: for each team, count wins/losses/draws and total points
		 *   scored vs. points conceded.
		 *
		 * Data shapes:
		 *   Match = {
		 *     team1: string, team1Score: number,
		 *     team2: string, team2Score: number,
		 *   }
		 *   TournamentState = { tournamentName: string, matches: Match[] }
		 *   TeamStanding = {
		 *     teamName: string,
		 *     wins: number, losses: number, draws: number,
		 *     pointsFor: number,        // total points this team scored
		 *     pointsAgainst: number,    // total points conceded by this team
		 *     pointBalance: number,     // pointsFor - pointsAgainst
		 *   }
		 *
		 * Persistence:
		 *   - Current tournament is auto-saved to localStorage on every change.
		 *   - User can Export/Import the same shape as a JSON backup file.
		 */

		const TOURNAMENT_STORAGE_KEY = 'gateball-tracker-v2';
		const THEME_STORAGE_KEY = 'gateball-tracker-theme';
		const AVAILABLE_THEMES = ['light', 'dark', 'high-contrast'];
		const DEFAULT_THEME = 'light';

		// ---------- Theme ----------
		function applyTheme(theme) {
			const chosenTheme = AVAILABLE_THEMES.includes(theme) ? theme : DEFAULT_THEME;
			document.documentElement.setAttribute('data-theme', chosenTheme);
			try { localStorage.setItem(THEME_STORAGE_KEY, chosenTheme); } catch (_) {}
			const themeSelect = document.getElementById('themeSelect');
			if (themeSelect) themeSelect.value = chosenTheme;
		}

		function loadTheme() {
			let savedTheme = DEFAULT_THEME;
			try { savedTheme = localStorage.getItem(THEME_STORAGE_KEY) || DEFAULT_THEME; } catch (_) {}
			applyTheme(savedTheme);
		}

		/** @type {{ tournamentName: string, matches: Array<{team1:string,team1Score:number,team2:string,team2Score:number}> }} */
		let tournamentState = { tournamentName: '', matches: [] };

		// ---------- Persistence ----------
		function loadTournamentState() {
			try {
				const rawJson = localStorage.getItem(TOURNAMENT_STORAGE_KEY);
				if (!rawJson) return;
				const parsed = JSON.parse(rawJson);
				if (parsed && Array.isArray(parsed.matches)) {
					tournamentState = {
						tournamentName: typeof parsed.tournamentName === 'string' ? parsed.tournamentName : '',
						matches: parsed.matches.filter(isValidMatch),
					};
				}
			} catch (err) {
				console.error('Falha ao carregar estado:', err);
			}
		}

		function saveTournamentState() {
			try {
				localStorage.setItem(TOURNAMENT_STORAGE_KEY, JSON.stringify(tournamentState));
			} catch (err) {
				console.error('Falha ao salvar estado:', err);
			}
		}

		function isValidMatch(match) {
			return match
				&& typeof match.team1 === 'string' && match.team1.trim() !== ''
				&& typeof match.team2 === 'string' && match.team2.trim() !== ''
				&& Number.isFinite(match.team1Score)
				&& Number.isFinite(match.team2Score);
		}

		// ---------- Mutations ----------
		function addMatch(match) {
			tournamentState.matches.push(match);
			saveTournamentState();
			render();
		}

		function deleteMatch(matchIndex) {
			tournamentState.matches.splice(matchIndex, 1);
			saveTournamentState();
			render();
		}

		function startNewTournament() {
			if (tournamentState.matches.length > 0 && !confirm('Isso vai apagar o torneio atual. Continuar?')) return;
			tournamentState = { tournamentName: '', matches: [] };
			saveTournamentState();
			render();
		}

		function setTournamentName(name) {
			tournamentState.tournamentName = name;
			saveTournamentState();
		}

		// ---------- Standings computation ----------
		// Ported from v1 backend TournamentService.calculateClassificationRank.
		// Given a list of matches, aggregate wins/losses/draws and points per team,
		// then sort: most wins first, then best point balance.
		function computeStandings(matches) {
			const standingsByTeam = new Map();

			function getOrCreateStanding(teamName) {
				if (!standingsByTeam.has(teamName)) {
					standingsByTeam.set(teamName, {
						teamName: teamName,
						wins: 0,
						losses: 0,
						draws: 0,
						pointsFor: 0,
						pointsAgainst: 0,
					});
				}
				return standingsByTeam.get(teamName);
			}

			for (const match of matches) {
				const team1Standing = getOrCreateStanding(match.team1);
				const team2Standing = getOrCreateStanding(match.team2);

				team1Standing.pointsFor += match.team1Score;
				team1Standing.pointsAgainst += match.team2Score;
				team2Standing.pointsFor += match.team2Score;
				team2Standing.pointsAgainst += match.team1Score;

				if (match.team1Score > match.team2Score) {
					team1Standing.wins++;
					team2Standing.losses++;
				} else if (match.team2Score > match.team1Score) {
					team2Standing.wins++;
					team1Standing.losses++;
				} else {
					team1Standing.draws++;
					team2Standing.draws++;
				}
			}

			const standings = Array.from(standingsByTeam.values()).map((standing) => ({
				...standing,
				pointBalance: standing.pointsFor - standing.pointsAgainst,
			}));

			// Sort: most wins first, tiebreaker is best point balance.
			standings.sort((a, b) => {
				if (b.wins !== a.wins) return b.wins - a.wins;
				return b.pointBalance - a.pointBalance;
			});

			return standings;
		}

		// ---------- Rendering ----------
		const domRefs = {
			tournamentName: document.getElementById('tournamentName'),
			matchesBody: document.getElementById('matchesBody'),
			matchesEmpty: document.getElementById('matchesEmpty'),
			matchesTable: document.getElementById('matchesTable'),
			classificationBody: document.getElementById('classificationBody'),
			classificationEmpty: document.getElementById('classificationEmpty'),
			classificationTable: document.getElementById('classificationTable'),
		};

		function render() {
			// Don't overwrite the tournament name input while the user is typing in it.
			if (document.activeElement !== domRefs.tournamentName) {
				domRefs.tournamentName.value = tournamentState.tournamentName;
			}

			renderMatchesTable();
			renderStandingsTable();
		}

		function renderMatchesTable() {
			domRefs.matchesBody.innerHTML = '';
			if (tournamentState.matches.length === 0) {
				domRefs.matchesTable.classList.add('hidden');
				domRefs.matchesEmpty.classList.remove('hidden');
				return;
			}
			domRefs.matchesTable.classList.remove('hidden');
			domRefs.matchesEmpty.classList.add('hidden');

			tournamentState.matches.forEach((match, matchIndex) => {
				const team1Won = match.team1Score > match.team2Score;
				const team2Won = match.team2Score > match.team1Score;
				const isDraw = !team1Won && !team2Won;

				const team1CellClass = isDraw ? 'draw' : (team1Won ? 'team winner' : 'team loser');
				const team2CellClass = isDraw ? 'draw' : (team2Won ? 'team winner' : 'team loser');
				const team1ScoreClass = isDraw ? '' : (team1Won ? 'winning-score' : 'losing-score');
				const team2ScoreClass = isDraw ? '' : (team2Won ? 'winning-score' : 'losing-score');
				const scoreSeparator = isDraw ? '=' : '×';
				const trophyIcon = '<span class="trophy">🏆</span>';

				const rowEl = document.createElement('tr');
				rowEl.innerHTML = `
					<td class="${team1CellClass}">${team1Won ? trophyIcon : ''}${escapeHtml(match.team1)}</td>
					<td class="match-score">
						<span class="${team1ScoreClass}">${match.team1Score}</span><span class="sep">${scoreSeparator}</span><span class="${team2ScoreClass}">${match.team2Score}</span>
					</td>
					<td class="${team2CellClass}">${escapeHtml(match.team2)}${team2Won ? ' ' + trophyIcon : ''}</td>
					<td><button class="delete-btn" data-index="${matchIndex}">Excluir</button></td>
				`;
				domRefs.matchesBody.appendChild(rowEl);
			});
		}

		function renderStandingsTable() {
			const standings = computeStandings(tournamentState.matches);
			domRefs.classificationBody.innerHTML = '';
			if (standings.length === 0) {
				domRefs.classificationTable.classList.add('hidden');
				domRefs.classificationEmpty.classList.remove('hidden');
				return;
			}
			domRefs.classificationTable.classList.remove('hidden');
			domRefs.classificationEmpty.classList.add('hidden');

			standings.forEach((standing, standingIndex) => {
				const position = standingIndex + 1;
				const rowEl = document.createElement('tr');
				rowEl.innerHTML = `
					<td class="pos">${position}º</td>
					<td class="team">${escapeHtml(standing.teamName)}</td>
					<td>${standing.wins}</td>
					<td>${standing.losses}</td>
					<td>${standing.draws}</td>
					<td>${standing.pointsFor}</td>
					<td>${standing.pointsAgainst}</td>
					<td>${standing.pointBalance}</td>
				`;
				domRefs.classificationBody.appendChild(rowEl);
			});
		}

		function escapeHtml(unsafeString) {
			return String(unsafeString).replace(/[&<>"']/g, (char) => ({
				'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
			}[char]));
		}

		// ---------- Backup (Export / Import) ----------
		function exportBackup() {
			const jsonData = JSON.stringify(tournamentState, null, 2);
			const blob = new Blob([jsonData], { type: 'application/json' });
			const downloadUrl = URL.createObjectURL(blob);
			const downloadLink = document.createElement('a');
			const safeFileName = (tournamentState.tournamentName || 'torneio').replace(/[^a-z0-9-_]+/gi, '_');
			const todayIsoDate = new Date().toISOString().slice(0, 10);
			downloadLink.href = downloadUrl;
			downloadLink.download = `${safeFileName}-${todayIsoDate}.json`;
			downloadLink.click();
			URL.revokeObjectURL(downloadUrl);
		}

		function importBackup(backupFile) {
			const fileReader = new FileReader();
			fileReader.onload = () => {
				try {
					const parsed = JSON.parse(String(fileReader.result));
					if (!parsed || !Array.isArray(parsed.matches)) throw new Error('Formato inválido');
					const validMatches = parsed.matches.filter(isValidMatch);
					tournamentState = {
						tournamentName: typeof parsed.tournamentName === 'string' ? parsed.tournamentName : '',
						matches: validMatches,
					};
					saveTournamentState();
					render();
				} catch (err) {
					alert('Arquivo inválido: ' + err.message);
				}
			};
			fileReader.readAsText(backupFile);
		}

		// ---------- Event wiring ----------
		document.getElementById('matchForm').addEventListener('submit', (event) => {
			event.preventDefault();
			const team1Name = document.getElementById('t1name').value.trim();
			const team2Name = document.getElementById('t2name').value.trim();
			const team1Score = Number(document.getElementById('t1score').value);
			const team2Score = Number(document.getElementById('t2score').value);
			if (!team1Name || !team2Name) return;
			if (!Number.isFinite(team1Score) || !Number.isFinite(team2Score)) return;

			addMatch({ team1: team1Name, team1Score, team2: team2Name, team2Score });

			document.getElementById('t1name').value = '';
			document.getElementById('t2name').value = '';
			document.getElementById('t1score').value = '0';
			document.getElementById('t2score').value = '0';
			document.getElementById('t1name').focus();
		});

		domRefs.matchesBody.addEventListener('click', (event) => {
			const deleteButton = event.target.closest('.delete-btn');
			if (!deleteButton) return;
			deleteMatch(Number(deleteButton.dataset.index));
		});

		domRefs.tournamentName.addEventListener('input', (event) => setTournamentName(event.target.value));

		document.getElementById('btnNew').addEventListener('click', startNewTournament);
		document.getElementById('btnExport').addEventListener('click', exportBackup);
		document.getElementById('btnImport').addEventListener('click', () => document.getElementById('importFile').click());
		document.getElementById('importFile').addEventListener('change', (event) => {
			const selectedFile = event.target.files && event.target.files[0];
			if (selectedFile) importBackup(selectedFile);
			event.target.value = '';
		});

		document.getElementById('btnFullscreen').addEventListener('click', async () => {
			document.body.classList.toggle('big-screen');
			try {
				if (document.fullscreenElement) {
					await document.exitFullscreen();
				} else {
					await document.documentElement.requestFullscreen();
				}
			} catch (_) { /* ignore: user may have denied fullscreen permission */ }
		});

		document.addEventListener('fullscreenchange', () => {
			// If the user exits fullscreen with F11 or Esc, also drop the big-screen styling.
			if (!document.fullscreenElement) document.body.classList.remove('big-screen');
		});

		document.addEventListener('keydown', (event) => {
			if (event.key === 'Escape' && document.body.classList.contains('big-screen')) {
				document.body.classList.remove('big-screen');
			}
		});

		document.getElementById('themeSelect').addEventListener('change', (event) => applyTheme(event.target.value));

		// ---------- Init ----------
		loadTheme();
		loadTournamentState();
		render();
	</script>
</body>
</html>
